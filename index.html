<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>미국 국채 장단기 금리차</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0e14;
      --surface: #111720;
      --border: #1e2a38;
      --accent: #00d4aa;
      --accent2: #ff6b6b;
      --text: #e2e8f0;
      --muted: #4a5568;
      --label: #8899aa;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 0;
    }

    header {
      padding: 18px 24px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 16px;
      background: var(--surface);
    }

    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 0.08em;
      color: var(--accent);
    }

    header span {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .badge {
      margin-left: auto;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 2px 8px;
      border-radius: 2px;
      letter-spacing: 0.08em;
    }

    .chart-section {
      padding: 16px 20px 8px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .chart-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: var(--label);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .chart-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .chart-box.main {
      flex: 1;
      min-height: 340px;
    }

    .chart-box.sub {
      height: 220px;
    }

    .tradingview-widget-container {
      width: 100%;
      height: 100%;
    }

    footer {
      padding: 10px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
    }

    footer p {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      color: var(--muted);
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      display: inline-block;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>

  <header>
    <h1>US YIELD SPREAD</h1>
    <span>미국 장단기 국채 금리차 모니터</span>
    <div class="badge">LIVE</div>
  </header>

  <div class="chart-section">

    <!-- 10Y - 2Y 스프레드 -->
    <div>
      <div class="chart-label">📈 10년물 − 2년물 금리차 (US10Y - US02Y)</div>
      <div class="chart-box main">
        <div class="tradingview-widget-container" style="height:100%">
          <div id="chart1" style="height:100%"></div>
          <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
          <script type="text/javascript">
            new TradingView.widget({
              "container_id": "chart1",
              "symbol": "FRED:T10Y2Y",
              "interval": "D",
              "timezone": "Asia/Seoul",
              "theme": "dark",
              "style": "2",
              "locale": "kr",
              "toolbar_bg": "#111720",
              "enable_publishing": false,
              "hide_top_toolbar": false,
              "hide_legend": false,
              "save_image": false,
              "height": "100%",
              "width": "100%",
              "studies": ["RSI@tv-basicstudies"],
              "show_popup_button": true,
              "popup_width": "1000",
              "popup_height": "650"
            });
          </script>
        </div>
      </div>
    </div>

    <!-- 10Y 단독 -->
    <div>
      <div class="chart-label">📉 미국 10년물 국채수익률 (US10Y)</div>
      <div class="chart-box sub">
        <div class="tradingview-widget-container" style="height:100%">
          <div id="chart2" style="height:100%"></div>
          <script type="text/javascript">
            new TradingView.widget({
              "container_id": "chart2",
              "symbol": "TVC:US10Y",
              "interval": "D",
              "timezone": "Asia/Seoul",
              "theme": "dark",
              "style": "2",
              "locale": "kr",
              "toolbar_bg": "#111720",
              "enable_publishing": false,
              "hide_top_toolbar": false,
              "hide_legend": false,
              "save_image": false,
              "height": "100%",
              "width": "100%",
              "show_popup_button": true,
              "popup_width": "1000",
              "popup_height": "650"
            });
          </script>
        </div>
      </div>
    </div>

    <!-- 2Y 단독 -->
    <div>
      <div class="chart-label">📉 미국 2년물 국채수익률 (US02Y)</div>
      <div class="chart-box sub">
        <div class="tradingview-widget-container" style="height:100%">
          <div id="chart3" style="height:100%"></div>
          <script type="text/javascript">
            new TradingView.widget({
              "container_id": "chart3",
              "symbol": "TVC:US02Y",
              "interval": "D",
              "timezone": "Asia/Seoul",
              "theme": "dark",
              "style": "2",
              "locale": "kr",
              "toolbar_bg": "#111720",
              "enable_publishing": false,
              "hide_top_toolbar": false,
              "hide_legend": false,
              "save_image": false,
              "height": "100%",
              "width": "100%",
              "show_popup_button": true,
              "popup_width": "1000",
              "popup_height": "650"
            });
          </script>
        </div>
      </div>
    </div>

  </div>

  <footer>
    <p><span class="dot"></span>TradingView 실시간 데이터 · 서울 시간 기준</p>
    <p>US10Y − US02Y Spread Monitor</p>
  </footer>

</body>
</html>
